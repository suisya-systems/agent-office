# Agent Office - herdr plugin manifest (design.md section 9).
# Pure Python stdlib, so no [[build]] step is needed - `herdr plugin install`
# just checks out the repo and runs the panes/actions below with CWD = plugin
# root.
#
# Why every entry is declared twice. herdr spawns `command` as argv with no
# shell, resolving argv[0] against PATH (plus PATHEXT on Windows), and no
# interpreter name resolves on all three platforms: `python3` is what unix
# has, but the python.org installer does not create a `python3.exe`, so on a
# plain Windows box the unix command would fail to spawn and the pane would
# simply never appear. Item-level `platforms` overrides the top-level list,
# and ids have to be unique inside a plugin, hence the `-windows` twins.

id = "agent-office"
name = "Agent Office"
version = "0.1.0"
description = "Your agent fleet as a pixel-art office: see who's working, who's stuck, jump to them."
min_herdr_version = "0.7.4"
platforms = ["linux", "macos", "windows"]

[[panes]]
id = "office"
title = "Agent Office"
placement = "tab"                 # horizontal layout suits a tab/zoomed pane
platforms = ["linux", "macos"]
command = ["python3", "-m", "office", "run"]

[[panes]]
id = "office-windows"
title = "Agent Office"
placement = "tab"
platforms = ["windows"]
command = ["py", "-3", "-m", "office", "run"]

[[actions]]
id = "open"
title = "Open Agent Office"
contexts = ["global"]
platforms = ["linux", "macos"]
command = ["python3", "-m", "office", "action-open"]

[[actions]]
id = "open-windows"
title = "Open Agent Office"
contexts = ["global"]
platforms = ["windows"]
command = ["py", "-3", "-m", "office", "action-open"]

[[actions]]
id = "jump-blocked"
title = "Jump to longest-blocked agent"
contexts = ["global"]
platforms = ["linux", "macos"]
command = ["python3", "-m", "office", "action-jump-blocked"]

[[actions]]
id = "jump-blocked-windows"
title = "Jump to longest-blocked agent"
contexts = ["global"]
platforms = ["windows"]
command = ["py", "-3", "-m", "office", "action-jump-blocked"]
