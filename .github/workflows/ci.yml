name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is not decoration: the named-pipe connection, the
        # msvcrt input backend and the encoder-aware tier choice only exist
        # for it, and its unix-only skips are the thing most likely to rot.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # `python`, not `python3`: Windows has no python3.exe, which is the same
      # reason the manifest declares a separate command per platform.
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Byte-compile sources
        run: python -m compileall office tests
